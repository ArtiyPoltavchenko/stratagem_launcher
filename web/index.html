<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>Stratagem Launcher</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <header class="header">
    <span class="header__title">Stratagems</span>
    <div class="header__status">
      <svg class="signal-icon" viewBox="0 0 16 12" fill="currentColor" aria-hidden="true">
        <rect x="0"  y="8" width="3" height="4"/>
        <rect x="5"  y="5" width="3" height="7"/>
        <rect x="10" y="2" width="3" height="10"/>
      </svg>
      <span class="status-dot" id="status-dot"></span>
    </div>
    <button class="settings-btn" id="settings-btn" aria-label="Settings">⚙</button>
  </header>

  <!-- Loadout bar -->
  <div class="loadout-bar" id="loadout-bar">
    <div class="loadout-tabs" id="loadout-tabs"></div>
    <button class="loadout-add-btn" id="loadout-add-btn" aria-label="New loadout">＋</button>
  </div>

  <!-- Edit mode header (hidden by default) -->
  <div class="edit-header hidden" id="edit-header">
    <span class="edit-header__label">Select stratagems</span>
    <span class="edit-header__counter" id="edit-counter">0 / 4</span>
    <div class="edit-header__actions">
      <button class="btn-edit-action" id="edit-cancel-btn">Cancel</button>
      <button class="btn-edit-action btn-edit-action--save" id="edit-save-btn">Save</button>
    </div>
  </div>

  <nav class="tabs" id="tabs" role="tablist">
    <button class="tab tab--active" data-cat="all" style="--tab-color:#f5c518" role="tab">All</button>
  </nav>

  <!-- Game area: search + card grid + embedded D-pad (loadout view) -->
  <div id="game-area">

    <div class="search-wrap">
      <input
        class="search-input"
        id="search"
        type="search"
        placeholder="Search stratagems…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
    </div>

    <main class="grid-wrap">
      <div class="grid" id="grid" role="list">
        <div class="empty" id="loading">Loading…</div>
      </div>
    </main>

    <!-- Embedded D-pad: visible only in loadout view -->
    <div class="loadout-dpad-area" id="loadout-dpad-area">
      <div class="ldpad-topbar">
        <div class="ldpad-sequence" id="ldpad-sequence"></div>
      </div>
      <!-- Countdown bar: depletes over auto-release timeout -->
      <div class="ldpad-countdown-bar">
        <div class="ldpad-countdown-fill" id="ldpad-countdown-fill"></div>
      </div>
      <!-- Auto-release timer slider -->
      <div class="ldpad-timer-row">
        <span class="ldpad-timer-label">Auto-release:</span>
        <input class="ldpad-timeout-slider" id="ldpad-timeout-slider"
               type="range" min="1" max="5" step="0.5" value="3">
        <span class="ldpad-timer-value" id="ldpad-timer-value">3.0s</span>
      </div>
      <div class="ldpad-status dpad-status--inactive" id="ldpad-status">Tap an arrow to enter sequence</div>
      <div class="ldpad-cross-wrap">
        <div class="dpad-cross">
          <button class="dpad-btn dpad-btn--up"     data-dir="up">▲</button>
          <button class="dpad-btn dpad-btn--left"   data-dir="left">◀</button>
          <button class="dpad-btn dpad-btn--center" aria-hidden="true"></button>
          <button class="dpad-btn dpad-btn--right"  data-dir="right">▶</button>
          <button class="dpad-btn dpad-btn--down"   data-dir="down">▼</button>
        </div>
      </div>
      <!-- Cancel is a direct child so it can be independently positioned in landscape -->
      <button class="ldpad-cancel-btn" id="ldpad-cancel-btn" aria-label="Cancel sequence">✕ Cancel</button>
    </div>

  </div>

  <div class="toast-container" id="toasts"></div>

  <!-- FAB: Manual D-pad input — visible only in All view (non-loadout) -->
  <button class="fab-dpad" id="fab-dpad" aria-label="Manual D-pad input">✛</button>

  <!-- D-pad overlay -->
  <div class="dpad-overlay hidden" id="dpad-overlay">

    <div class="dpad-topbar">
      <div class="dpad-sequence" id="dpad-sequence"></div>
      <button class="dpad-close-btn" id="dpad-close-btn" aria-label="Close D-pad">✕</button>
    </div>

    <div class="dpad-status" id="dpad-status">Hold Ctrl active</div>

    <div class="dpad-body">
      <div class="dpad-cross" id="dpad-cross">
        <button class="dpad-btn dpad-btn--up"    data-dir="up">▲</button>
        <button class="dpad-btn dpad-btn--left"  data-dir="left">◀</button>
        <button class="dpad-btn dpad-btn--center" aria-hidden="true"></button>
        <button class="dpad-btn dpad-btn--right" data-dir="right">▶</button>
        <button class="dpad-btn dpad-btn--down"  data-dir="down">▼</button>
      </div>
    </div>

  </div>

  <!-- Settings overlay -->
  <div class="settings-overlay hidden" id="settings-overlay">
    <div class="settings-panel" role="dialog" aria-label="Settings">
      <button class="settings-close" id="settings-close" aria-label="Close">✕</button>
      <h2>Settings</h2>

      <div class="settings-row">
        <label for="setting-ip">Server IP</label>
        <input type="text" id="setting-ip" placeholder="127.0.0.1:5000">
      </div>

      <div class="settings-row">
        <label>
          Key delay: <span class="range-value" id="delay-value">50</span> ms
        </label>
        <input type="range" id="setting-delay" min="10" max="300" step="10" value="50">
      </div>

      <div class="settings-row">
        <label>
          Cooldown reduction: <span class="range-value" id="cd-modifier-value">0</span>%
        </label>
        <div class="settings-range-row">
          <input type="range" id="setting-cd-modifier" min="0" max="50" step="5" value="0">
          <input type="number" id="setting-cd-modifier-num" class="range-num-input" min="0" max="50" step="5" value="0">
        </div>
      </div>

      <div class="settings-row">
        <label class="settings-check-label">
          <input type="checkbox" id="setting-show-cooldowns" checked>
          Show cooldowns on cards
        </label>
      </div>

      <div class="settings-row">
        <label class="settings-check-label">
          <input type="checkbox" id="setting-auto-click">
          Auto-throw after input (LMB click)
        </label>
      </div>

      <div class="settings-row">
        <button class="btn btn--primary" id="test-conn-btn">Test Connection</button>
      </div>

      <div class="settings-row">
        <button class="btn" id="apply-btn">Apply &amp; Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
